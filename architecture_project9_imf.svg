<text font-size="12" font-weight="600" x="322" y="238" text-anchor="middle" fill="#3C3489">DuckDB (Local In-Memory Transform)</text>
<text font-size="11" x="322" y="256" text-anchor="middle" fill="#534AB7">reads S3 Parquet via httpfs · PIVOT indicators · enrich · health score composite</text>
<text font-size="11" x="322" y="274" text-anchor="middle" fill="#534AB7">income group classification · no cluster needed · &lt;2s for 50,000 rows</text>
